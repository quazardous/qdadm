name: Release

on:
  push:
    branches: [main]

# Cancel any in-flight release run when a new commit lands. The action is
# idempotent, so the latest commit always wins.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# changesets/action needs to commit the Version PR and create release tags.
# id-token=write enables BOTH npm provenance attestation AND OIDC Trusted
# Publishing — npm trusts this exact workflow (owner/repo/workflow file)
# as registered in each package's "Trusted Publisher" settings on npmjs.com,
# so we don't need a long-lived NPM_TOKEN secret. The OIDC token minted at
# job start is exchanged by `npm publish` for a short-lived publish-scoped
# credential.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22.x bundles npm 10.9.x, but OIDC Trusted Publishing auth was
      # only added in npm 11.5.1. npm 10 happily signs provenance (that's
      # sigstore-only and works with any OIDC-capable runtime), then sends
      # an unauthenticated PUT and receives 404 — npm's pattern for "you
      # can't see this package" rather than a clear 401/403. Pin npm to
      # ^11.5.1 explicitly so the publish step can exchange the GitHub
      # OIDC token for a short-lived publish credential.
      - name: Pin npm to a Trusted-Publishing-capable version
        run: npm install -g npm@^11.5.1

      - name: Install
        run: npm ci

      - name: Test workspaces
        run: npm test --workspaces --if-present

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When there are pending .changeset/*.md files: opens/updates a
          # "Version Packages" PR that bumps versions and refreshes the
          # lockfile. When there are none and versions are ahead of the
          # registry: publishes everything in topological order.
          version: npm run release:version
          publish: npx changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth via OIDC Trusted Publishing. Each package
          # (qdadm, @quazardous/qdcore, @quazardous/qddebug) is configured
          # on npmjs.com to trust this repo + workflow file. Provenance is
          # signed with the same OIDC token (NPM_CONFIG_PROVENANCE=true).
          NPM_CONFIG_PROVENANCE: "true"
