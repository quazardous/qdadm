name: Release

on:
  push:
    branches: [main]

# Cancel any in-flight release run when a new commit lands. The action is
# idempotent, so the latest commit always wins.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# changesets/action needs to commit the Version PR and create release tags.
# id-token=write is kept on for npm provenance attestation (signed with the
# OIDC token, published to sigstore — independent of how publish auth itself
# works). Publish auth uses NPM_TOKEN.
#
# OIDC Trusted Publishing was attempted (npm 11.5.1 feature) but the
# self-upgrade step on the GitHub-Actions runner kept hitting npm's
# MODULE_NOT_FOUND self-upgrade bug. Revisit when a runner image ships
# npm 11.5+ natively.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Test workspaces
        run: npm test --workspaces --if-present

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When there are pending .changeset/*.md files: opens/updates a
          # "Version Packages" PR that bumps versions and refreshes the
          # lockfile. When there are none and versions are ahead of the
          # registry: publishes everything in topological order.
          version: npm run release:version
          publish: npx changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Granular Automation token from npmjs.com, scope-limited to qdadm
          # and @quazardous/*. Bypass-2FA on (required for CI). Provenance
          # attestation is still signed via the OIDC token in id-token=write.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
