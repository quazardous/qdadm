name: Release

on:
  push:
    branches: [main]

# Cancel any in-flight release run when a new commit lands. The action is
# idempotent, so the latest commit always wins.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# changesets/action needs to commit the Version PR and create release tags.
# id-token=write powers both:
#   - npm provenance attestation (signed with the OIDC token, published to
#     sigstore — visible on the npm package page).
#   - Trusted Publishers (OIDC) auth at the npm registry — short-lived token
#     issued by npmjs.com per run, no NPM_TOKEN secret required. Configured
#     per-package on npmjs.com (publisher = GitHub Actions, repo =
#     quazardous/qdadm, workflow = release.yml).
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22 LTS ships with npm 10.x; OIDC Trusted Publishing requires
      # npm 11.5.1+ for the registry handshake. Upgrade explicitly.
      - name: Upgrade npm for OIDC Trusted Publishers
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Test workspaces
        run: npm test --workspaces --if-present

      # Type-safety gate (#1024): the package ships raw TS, so anything that
      # doesn't compile reaches consumers' vue-tsc directly. Three layers:
      # compile the sources, emit the declarations, then typecheck the PACKED
      # tarball from a strict consumer fixture (validates exports/files too).
      - name: Type-check workspaces
        run: npm run type-check --workspaces --if-present

      - name: Declaration-emit check
        run: npm run build:types --workspace=@quazardous/qdadm

      - name: Consumer smoke test (packed tarball)
        run: bash tools/consumer-smoke/run.sh

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When there are pending .changeset/*.md files: opens/updates a
          # "Version Packages" PR that bumps versions and refreshes the
          # lockfile. When there are none and versions are ahead of the
          # registry: publishes everything in topological order.
          version: npm run release:version
          publish: npx changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publish auth comes from OIDC Trusted Publishers
          # configured on npmjs.com for each package. The runner exchanges its
          # GitHub OIDC token for a short-lived npm token automatically.
          NPM_CONFIG_PROVENANCE: "true"
