name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm provenance (signed attestation)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./packages/qdadm/package.json').version")
          if [[ "$tag" != "$pkg_version" ]]; then
            echo "ERROR: tag '$tag' does not match package.json version '$pkg_version'" >&2
            exit 1
          fi
          echo "OK: tag v$tag matches package.json version $pkg_version"

      - name: Run tests
        working-directory: packages/qdadm
        run: npm test

      - name: Publish qdadm
        working-directory: packages/qdadm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
